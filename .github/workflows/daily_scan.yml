name: Daily Scan and Report

on:
  schedule:
    # 11:00 UTC = 8:00 AM Argentina (UTC-3)
    - cron: '0 11 * * *'
  workflow_dispatch:  # Permite ejecutarlo manualmente si querés

jobs:
  scan-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar dependencias
        run: pip install -r requirements.txt

      - name: 🔍 Ejecutar escaneo SMC
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --mode scan

      - name: 📤 Enviar reporte por Telegram
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<EOF
          import requests
          import os

          token = os.environ["TOKEN"]
          chat_id = os.environ["CHAT_ID"]

          # Leer el reporte generado
          with open("results/reporte_latest.txt", "r", encoding="utf-8") as f:
              reporte = f.read()

          # Telegram tiene límite de 4096 caracteres por mensaje
          url = f"https://api.telegram.org/bot{token}/sendMessage"
          for i in range(0, len(reporte), 4000):
              payload = {
                  "chat_id": chat_id,
                  "text": reporte[i:i+4000],
                  "parse_mode": "HTML"  # opcional, si querés formato
              }
              r = requests.post(url, json=payload)
              if r.status_code != 200:
                  print(f"Error enviando parte {i}: {r.text}")
          EOF
