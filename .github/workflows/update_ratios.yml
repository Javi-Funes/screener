name: Update Ratios

on:
  schedule:
    # Ejecutar todos los domingos a las 8 AM Argentina (11 UTC)
    - cron: '0 11 * * 0'
  workflow_dispatch:  # Permite ejecución manual

jobs:
  update-ratios:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar actualización de ratios
        run: python scripts/update_ratios.py

      - name: Commit y push si hay cambios
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add results/ratios_cedears.json results/ratios_cedears.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Actualizar ratios CEDEARs [skip ci]"
          git push
