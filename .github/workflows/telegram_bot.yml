name: Telegram Bot Polling

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache last_update_id
        id: cache-last-id
        uses: actions/cache@v4
        with:
          path: last_update_id.txt
          key: last-update-id-${{ github.run_id }}
          restore-keys: |
            last-update-id-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run polling
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python poll_telegram.py

      - name: Save last_update_id (if changed)
        # No es necesario hacer nada extra, el archivo se actualiza en el paso anterior
        # El cache se guardará automáticamente al final si hay cambios (gracias a actions/cache)
